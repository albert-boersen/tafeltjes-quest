<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160">
  <!-- Background -->
  <rect width="480" height="160" rx="16" fill="#1a0a2e"/>
  <!-- Decorative border -->
  <rect x="4" y="4" width="472" height="152" rx="13" fill="none" stroke="#f5c842" stroke-width="1.5" opacity="0.4"/>

  <!-- Shield icon (left side) -->
  <g transform="translate(68, 80)">
    <path d="M0 -62 L44 -46 V-14 C44 18 24 38 0 50 C-24 38 -44 18 -44 -14 V-46 Z"
          fill="#2d1b69" stroke="#f5c842" stroke-width="2.8" stroke-linejoin="round"/>
    <path d="M0 -55 L38 -41 V-14 C38 14 21 32 0 43 C-21 32 -38 14 -38 -14 V-41 Z"
          fill="none" stroke="#f5c842" stroke-width="0.9" opacity="0.45"/>
    <!-- Sword blade -->
    <polygon points="-5.5,-50 5.5,-50 6.5,-17 0,-14.5 -6.5,-17" fill="#f5c842"/>
    <!-- Crossguard -->
    <rect x="-24" y="-17" width="48" height="7" rx="3.5" fill="#f5c842"/>
    <!-- Grip -->
    <rect x="-4" y="-10" width="8" height="14" rx="4" fill="#9a7800"/>
    <!-- Pommel -->
    <ellipse cx="0" cy="11" rx="8" ry="6.5" fill="#f5c842"/>
  </g>

  <!-- Title text: TAFELTJES -->
  <text x="148" y="72" font-family="Georgia, 'Times New Roman', serif"
        font-size="46" font-weight="bold" fill="#f5c842"
        letter-spacing="4">TAFELTJES</text>

  <!-- Subtitle: QUEST -->
  <text x="148" y="118" font-family="Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="bold" fill="#ffffff"
        letter-spacing="8">QUEST</text>

  <!-- Decorative divider line -->
  <line x1="148" y1="82" x2="460" y2="82" stroke="#f5c842" stroke-width="1" opacity="0.35"/>

  <!-- Small multiplication symbol as accent -->
  <text x="456" y="76" font-family="Georgia, serif" font-size="20" fill="#f5c842" opacity="0.6" text-anchor="end">×</text>
</svg>
